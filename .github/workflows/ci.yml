# Phase 3 CI matrix (modernization plan).
#
# All four jobs are REQUIRED: legacy-32bit, linux-x64, and macos-arm64 were
# promoted in Phase 2b (64-bit Linux and native macOS arm64 build, boot, pass
# tests, and match the Phase 0 characterization goldens); windows-msvc was
# promoted in Phase 3 Task 7 once the hand-rolled platform-gated socket shim,
# chrono/filesystem migrations, and MSVC bring-up landed (Task 6) and its
# continue-on-error escape hatch was removed. Windows CI verifies configure +
# build + the full ctest suite (characterization goldens included); live boot
# verification on Windows is deferred (no Windows host with world data exists)
# — see docs/BUILD.md and the plan's Phase 3 exit note.
#
# CI deliberately has NO boot smoke and NO account_smoke.py: both need
# lib/world/ (separate repo, git-ignored) and the Rust proxy. Unit tests and
# the committed characterization goldens (src/tests/goldens/) need neither.
name: CI

on:
  push:
    branches: [master, 'modernization/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-32bit:
    name: Linux i386 legacy (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build i386 toolchain image
        run: docker compose build
      - name: Build game binary (src Makefile, -m32)
        run: docker compose run --rm rots bash -lc 'cd /rots/src && make setup && make -j"$(nproc)" all'
      - name: Build game + tests via CMake and run ctest
        run: docker compose run --rm rots bash -lc 'cd /rots && make test'
      - name: Run monolithic test binary (masking-proof runner)
        run: |
          docker compose run --rm rots bash -lc '
            cd /rots/src/tests && make -j"$(nproc)" tests &&
            cd /rots/src/tests && /rots/bin/tests 2>&1 | tee /tmp/tests.out
            grep -E "\[  PASSED  \] [1-9][0-9]* tests" /tmp/tests.out'

  linux-x64:
    name: Linux x64 (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: sudo apt-get update && sudo apt-get install -y libgtest-dev libcrypt-dev
      - name: Configure
        run: cd src && cmake --preset linux-x64
      - name: Build
        run: cd src && cmake --build --preset linux-x64 -j4
      - name: Test
        run: cd src && ctest --preset linux-x64

  macos-arm64:
    name: macOS arm64 (required)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: brew install googletest
      - name: Configure
        run: cd src && cmake --preset macos-arm64
      - name: Build
        run: cd src && cmake --build --preset macos-arm64 -j4
      - name: Test
        run: cd src && ctest --preset macos-arm64

  windows-msvc:
    name: Windows MSVC (required)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # GoogleTest is fetched from source via CMake FetchContent for this preset
      # only (see src/CMakeLists.txt) since the windows-2022 runner has no system
      # GTest package; cache the FetchContent download+build so a cache hit skips
      # both steps on unchanged CMakeLists.txt.
      - name: Cache GoogleTest FetchContent
        uses: actions/cache@v4
        with:
          path: build/windows-msvc/_deps
          key: windows-msvc-gtest-${{ hashFiles('src/CMakeLists.txt') }}
      - name: Configure
        run: cd src; cmake --preset windows-msvc
      - name: Build
        run: cd src; cmake --build --preset windows-msvc
      # -j4: each gtest_discover_tests case runs as its own isolated process, so
      # parallel execution is safe (no shared in-process global state) and keeps
      # the full ~645-test suite (641 on Windows; a handful of cases are
      # POSIX-only) comfortably inside the 30-minute job wall on the 4-core
      # windows-2022 runner.
      - name: Test
        run: cd src; ctest --preset windows-msvc -j4
