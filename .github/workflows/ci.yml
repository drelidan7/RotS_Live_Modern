# Phase 3 CI matrix (modernization plan), extended in Phase 5 Task 6.
#
# All six jobs are REQUIRED: legacy-32bit, linux-x64, and macos-arm64 were
# promoted in Phase 2b (64-bit Linux and native macOS arm64 build, boot, pass
# tests, and match the Phase 0 characterization goldens); windows-msvc was
# promoted in Phase 3 Task 7 once the hand-rolled platform-gated socket shim,
# chrono/filesystem migrations, and MSVC bring-up landed (Task 6) and its
# continue-on-error escape hatch was removed. Windows CI verifies configure +
# build + the full ctest suite (characterization goldens included); live boot
# verification on Windows is deferred (no Windows host with world data exists)
# — see docs/BUILD.md and the plan's Phase 3 exit note. sanitize-linux and
# sanitize-macos (Phase 5 Task 6) run the same full ctest suite under
# ASan+UBSan (linux-x64-sanitize / macos-arm64-asan CMake presets); leak
# detection (ASAN_OPTIONS detect_leaks=1) runs on sanitize-linux only, since
# AppleClang's LeakSanitizer support on macOS is limited/unreliable.
#
# CI deliberately has NO boot smoke and NO account_smoke.py: both need
# lib/world/ (separate repo, git-ignored) and the Rust proxy. Unit tests and
# the committed characterization goldens (src/tests/goldens/) need neither.
#
# clang-tidy-advisory (Phase 5 Task 7) is deliberately NOT one of the
# required jobs above: it runs the checked-in root .clang-tidy (curated,
# WarningsAsErrors: '') over just the .cpp files changed vs origin/master,
# using the linux-x64 compile database, and continue-on-error: true so a
# finding never blocks a merge. It is advisory signal only.
name: CI

on:
  push:
    branches: [master, 'modernization/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-32bit:
    name: Linux i386 legacy (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build i386 toolchain image
        run: docker compose build
      - name: Build game binary (src Makefile, -m32)
        run: docker compose run --rm rots bash -lc 'cd /rots/src && make setup && make -j"$(nproc)" all'
      - name: Build game + tests via CMake and run ctest
        run: docker compose run --rm rots bash -lc 'cd /rots && make test'
      - name: Run monolithic test binary (masking-proof runner)
        run: |
          docker compose run --rm rots bash -lc '
            cd /rots/src/tests && make -j"$(nproc)" tests &&
            cd /rots/src/tests && /rots/bin/tests 2>&1 | tee /tmp/tests.out
            grep -E "\[  PASSED  \] [1-9][0-9]* tests" /tmp/tests.out'

  linux-x64:
    name: Linux x64 (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: sudo apt-get update && sudo apt-get install -y libgtest-dev libcrypt-dev
      # This job builds directly on the runner (no rots64 container), so the
      # C++20 bump (Phase 4 Wave 1 Task 1) depends on whatever g++ ubuntu-24.04
      # ships by default. ubuntu-24.04's default g++ is 13.x (the first GCC
      # with std::format), so this is a verification, not a pin -- fail loudly
      # here rather than hitting a confusing std::format error deep in the
      # build if a future runner image ever regresses the default.
      - name: Verify g++ provides C++20 std::format (>= 13)
        run: |
          g++ --version
          gxx_major=$(g++ -dumpversion | cut -d. -f1)
          if [ "$gxx_major" -lt 13 ]; then
            echo "::error::g++ major version $gxx_major < 13; std::format unavailable" >&2
            exit 1
          fi
      - name: Configure
        run: cd src && cmake --preset linux-x64
      - name: Build
        run: cd src && cmake --build --preset linux-x64 -j4
      - name: Test
        run: cd src && ctest --preset linux-x64

  sanitize-linux:
    name: Linux x64 ASan+UBSan (required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: sudo apt-get update && sudo apt-get install -y libgtest-dev libcrypt-dev
      - name: Verify g++ provides C++20 std::format (>= 13)
        run: |
          g++ --version
          gxx_major=$(g++ -dumpversion | cut -d. -f1)
          if [ "$gxx_major" -lt 13 ]; then
            echo "::error::g++ major version $gxx_major < 13; std::format unavailable" >&2
            exit 1
          fi
      - name: Configure
        run: cd src && cmake --preset linux-x64-sanitize
      - name: Build
        run: cd src && cmake --build --preset linux-x64-sanitize -j4
      # Leak detection lives on this job only: macOS AppleClang's LeakSanitizer
      # support is limited/unreliable, so the macOS sanitize job below disables
      # detect_leaks and relies on this Linux job to catch real leaks.
      # LSAN_OPTIONS points at the checked-in suppression file (src/tests/
      # sanitize.supp) -- see that file's header comment for the suppression
      # discipline (every entry is a disclosed, real, deliberately-deferred
      # leak, not a false positive).
      - name: Test
        run: cd src && ASAN_OPTIONS=detect_leaks=1 ctest --preset linux-x64-sanitize
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/src/tests/sanitize.supp

  macos-arm64:
    name: macOS arm64 (required)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: brew install googletest
      - name: Configure
        run: cd src && cmake --preset macos-arm64
      - name: Build
        run: cd src && cmake --build --preset macos-arm64 -j4
      - name: Test
        run: cd src && ctest --preset macos-arm64

  sanitize-macos:
    name: macOS arm64 ASan+UBSan (required)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install GoogleTest
        run: brew install googletest
      - name: Configure
        run: cd src && cmake --preset macos-arm64-asan
      - name: Build
        run: cd src && cmake --build --preset macos-arm64-asan -j4
      # AppleClang's LeakSanitizer support is limited/unreliable on macOS, so
      # leak detection is disabled here; the sanitize-linux job is the leak
      # gate (ASAN_OPTIONS detect_leaks=1 there). This job still catches
      # memory corruption (ASan) and UB (UBSan) on the macOS/AppleClang ABI.
      # detect_container_overflow=0 (Phase 5 Task 9): the brew-installed
      # GoogleTest static lib is NOT ASan-instrumented, and mixing it with the
      # instrumented test binary + Apple's annotated libc++ produces the
      # documented container-overflow false positive (fires inside gtest's own
      # JSON test-list printer during ctest PRE_TEST discovery -- see
      # https://github.com/google/sanitizers/wiki/AddressSanitizerContainerOverflow).
      # The fully-instrumented sanitize-linux job keeps container-overflow
      # checking for the game's own code.
      - name: Test
        run: cd src && ASAN_OPTIONS=detect_leaks=0:detect_container_overflow=0 ctest --preset macos-arm64-asan
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  windows-msvc:
    name: Windows MSVC (required)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # GoogleTest is fetched from source via CMake FetchContent for this preset
      # only (see src/CMakeLists.txt) since the windows-2022 runner has no system
      # GTest package; cache the FetchContent download+build so a cache hit skips
      # both steps on unchanged CMakeLists.txt.
      - name: Cache GoogleTest FetchContent
        uses: actions/cache@v4
        with:
          path: build/windows-msvc/_deps
          key: windows-msvc-gtest-${{ hashFiles('src/CMakeLists.txt') }}
      - name: Configure
        run: cd src; cmake --preset windows-msvc
      - name: Build
        run: cd src; cmake --build --preset windows-msvc
      # -j4: each gtest_discover_tests case runs as its own isolated process, so
      # parallel execution is safe (no shared in-process global state) and keeps
      # the full ~645-test suite (641 on Windows; a handful of cases are
      # POSIX-only) comfortably inside the 30-minute job wall on the 4-core
      # windows-2022 runner.
      - name: Test
        run: cd src; ctest --preset windows-msvc -j4

  clang-tidy-advisory:
    name: clang-tidy (advisory, not required)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Advisory: a clang-tidy finding must never fail this job's caller (no
    # branch protection should ever name this job required). The root
    # .clang-tidy is curated/tuned (Phase 5 Task 7 report) and already
    # advisory (WarningsAsErrors: ''); continue-on-error here is the
    # workflow-level belt-and-suspenders in case a future edit to that file
    # ever re-enables WarningsAsErrors.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so `origin/master...HEAD` below has a merge base to
          # diff against; this job only ever reads git history, not depth-1
          # HEAD state, so the extra fetch cost is acceptable for an
          # advisory job.
          fetch-depth: 0
      - name: Install clang-tidy + GoogleTest
        run: sudo apt-get update && sudo apt-get install -y clang-tidy libgtest-dev libcrypt-dev
      - name: Configure (compile_commands.json only; no build needed for clang-tidy)
        run: cd src && cmake --preset linux-x64
      - name: Find .cpp files changed vs origin/master
        id: changed
        run: |
          git fetch origin master --quiet
          # --diff-filter=d excludes deleted paths (a file clang-tidy can't
          # analyze because it no longer exists in the checkout).
          git diff --name-only --diff-filter=d origin/master...HEAD -- 'src/*.cpp' > /tmp/changed_files.txt
          if [ -s /tmp/changed_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run clang-tidy over changed files
        if: steps.changed.outputs.has_files == 'true'
        run: |
          # Parallelized across the runner's cores (Phase 5 Task 10 fix): a
          # long-lived integration branch's diff vs origin/master can span
          # dozens of files (Phase 5 hardening alone touched 80 -- const-
          # correctness/sprintf/warning sweeps land across most of src/), and
          # a serial one-file-at-a-time loop -- each clang-tidy invocation is
          # a full-TU parse of the game's large headers -- measurably blew
          # past this job's 30-minute budget (two runs cancelled mid-file by
          # the job timeout, not by an empty diff: confirmed via CI run logs
          # showing 59-60 of 80 files completed when the timeout fired).
          # Each file's output is captured to its own log first so parallel
          # workers never interleave inside one ::group:: block, then the
          # logs are replayed in stable, deterministic order.
          mkdir -p /tmp/tidy-logs
          # shellcheck disable=SC2016  # single quotes are intentional: $1/$f
          # expand in the child `bash -c`, not this outer shell.
          xargs -a /tmp/changed_files.txt -P "$(nproc)" -I{} bash -c '
            f="$1"
            safe="$(echo "$f" | tr "/" "_")"
            clang-tidy -p build/linux-x64 "$f" > "/tmp/tidy-logs/$safe.log" 2>&1
            echo $? > "/tmp/tidy-logs/$safe.rc"
          ' _ {}
          status=0
          while IFS= read -r f; do
            safe="$(echo "$f" | tr "/" "_")"
            echo "::group::clang-tidy $f"
            cat "/tmp/tidy-logs/$safe.log"
            echo "::endgroup::"
            [ "$(cat "/tmp/tidy-logs/$safe.rc" 2>/dev/null)" = "0" ] || status=1
          done < /tmp/changed_files.txt
          exit "$status"
      - name: No changed .cpp files
        if: steps.changed.outputs.has_files != 'true'
        run: echo "No src/*.cpp changes vs origin/master; nothing for clang-tidy to check."
