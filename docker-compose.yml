# Dockerized 32-bit build/run for RotS. See docs/BUILD.md.
#
#   docker compose build                       # build both i386 and x64 images
#   docker compose build rots                  # build the i386 toolchain image
#   docker compose build rots64                # build the x64 runtime image
#   docker compose run --rm --service-ports rots   # interactive shell in the repo
#
# The repo is bind-mounted at /rots, so build artifacts (bin/ageland, *.o) and any
# source edits are shared with the host. The game listens on port 1024.
#
# `rots64` is the 64-bit sibling (native ABI, linux-x64 CMake preset) used to
# verify cross-ABI compatibility of the JSON persistence layer against the SAME
# bind-mounted lib/ data. It maps host port 1064 (not 1024) so both containers
# CAN run at once without a port collision — in practice only one is booted
# against live lib/ data at a time (see scripts/boot-golden.sh --service).
services:
  rots:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/386
    image: rots-dev:trixie-i386
    container_name: rots
    working_dir: /rots
    volumes:
      - .:/rots
      # Container-private CMake tree (see docs/BUILD.md "Container build
      # isolation"): masks the bind-mounted build/ so host and container
      # generated state can never interact. Clean rebuild: `docker compose
      # down -v` (resolves the project-name prefix itself and clears both
      # volumes), or `docker volume rm <project>_rots-build-i386` to target
      # just this one — compose derives <project> from the directory name.
      # Inspect: docker compose run --rm rots ls /rots/build
      - rots-build-i386:/rots/build
    ports:
      - "1024:1024"
    stdin_open: true
    tty: true
    command: bash

  rots64:
    build:
      context: .
      dockerfile: Dockerfile.x64
    platform: linux/amd64
    image: rots-dev:trixie-x64
    container_name: rots64
    working_dir: /rots
    volumes:
      - .:/rots
      # Same isolation for the 64-bit sibling; volume <project>_rots-build-x64.
      - rots-build-x64:/rots/build
    ports:
      - "1064:1024"
    stdin_open: true
    tty: true
    command: bash

volumes:
  # Named build volumes. Motivated by three stale-generated-tree incidents
  # (see scripts/i386-battery.sh step 0's citations): host<->container CMake
  # state can no longer cross. CI runners create these empty per run.
  rots-build-i386:
  rots-build-x64:
